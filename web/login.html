<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>MoodRipple — Sign In</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #0c0c0f;
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    color: #fff;
    user-select: none;
  }

  /* Arc decorations */
  .arc {
    position: fixed;
    border-radius: 50%;
    border: 1px solid rgba(255,255,255,0.04);
    pointer-events: none;
    z-index: 0;
  }
  .arc-tl { width: 520px; height: 520px; top: -230px; left: -210px; }
  .arc-br { width: 440px; height: 440px; bottom: -200px; right: -180px; }
  .arc-tr-glow {
    position: fixed;
    width: 300px; height: 300px;
    top: -80px; right: -80px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(245,197,24,0.06) 0%, transparent 70%);
    pointer-events: none; z-index: 0;
  }
  .arc-bl-glow {
    position: fixed;
    width: 300px; height: 300px;
    bottom: -80px; left: -80px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(245,197,24,0.04) 0%, transparent 70%);
    pointer-events: none; z-index: 0;
  }

  /* Window chrome */
  .win-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 18px 0;
    -webkit-app-region: drag;
    flex-shrink: 0;
    z-index: 100;
  }
  .brand {
    font-size: 12px;
    font-weight: 700;
    color: rgba(245,197,24,0.65);
    letter-spacing: 0.3px;
  }
  .win-controls {
    display: flex;
    gap: 6px;
    -webkit-app-region: no-drag;
  }
  .win-btn {
    width: 22px; height: 22px;
    border: none;
    border-radius: 50%;
    cursor: pointer;
    font-size: 12px;
    display: flex; align-items: center; justify-content: center;
    color: rgba(255,255,255,0.40);
    background: transparent;
    transition: background 0.15s, color 0.15s;
  }
  .win-btn:hover { background: rgba(255,255,255,0.10); color: #fff; }
  .win-btn.close:hover { background: #ef4444; color: #fff; }

  /* Main centering */
  .main {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    z-index: 10;
  }

  /* Card */
  .card {
    background: #161618;
    border: 1px solid rgba(255,255,255,0.07);
    border-radius: 22px;
    padding: 44px 44px 40px;
    width: 400px;
    box-shadow: 0 40px 100px rgba(0,0,0,0.55);
  }

  /* Orb */
  .orb {
    width: 52px; height: 52px;
    background: radial-gradient(circle at 38% 38%,
      #FFE535 0%, #F5C518 40%, rgba(245,197,24,0.08) 75%);
    border-radius: 50%;
    margin: 0 auto 20px;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px; color: #0c0c0f;
    box-shadow: 0 0 28px rgba(245,197,24,0.30);
  }
  h1 {
    font-size: 24px; font-weight: 800;
    color: #f0f0f2; letter-spacing: -0.4px;
    text-align: center; margin-bottom: 4px;
  }
  .subtitle {
    font-size: 13px; color: rgba(240,240,242,0.35);
    text-align: center; margin-bottom: 28px;
  }

  /* Error box */
  .error-box {
    background: rgba(239,68,68,0.08);
    border: 1px solid rgba(239,68,68,0.20);
    border-radius: 10px;
    padding: 11px 14px;
    font-size: 12px; color: #fca5a5;
    margin-bottom: 18px;
    display: none;
    line-height: 1.5;
  }
  .error-box.visible { display: block; }

  /* Fields */
  .field { margin-bottom: 16px; }
  .field label {
    display: block;
    font-size: 10px; font-weight: 600;
    color: rgba(240,240,242,0.40);
    letter-spacing: 0.8px; text-transform: uppercase;
    margin-bottom: 7px;
  }
  .field input {
    width: 100%; height: 46px;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 10px;
    color: #f0f0f2; font-size: 13px;
    padding: 0 14px;
    outline: none;
    transition: border-color 0.2s, background 0.2s;
    font-family: inherit;
  }
  .field input::placeholder { color: rgba(240,240,242,0.22); }
  .field input:focus {
    border-color: rgba(245,197,24,0.55);
    background: rgba(255,255,255,0.07);
  }

  /* Remember me */
  .remember {
    display: flex; align-items: center; gap: 9px;
    margin-bottom: 22px; cursor: pointer;
  }
  .remember input[type=checkbox] { display: none; }
  .check-box {
    width: 17px; height: 17px;
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 5px;
    background: rgba(255,255,255,0.05);
    display: flex; align-items: center; justify-content: center;
    transition: all 0.15s; flex-shrink: 0;
    font-size: 11px;
  }
  .remember input:checked + .check-box {
    background: #F5C518; border-color: #F5C518; color: #0c0c0f;
  }
  .remember span { font-size: 13px; color: rgba(240,240,242,0.45); }

  /* Primary button */
  .btn-primary {
    width: 100%; height: 50px;
    background: #F5C518;
    color: #0c0c0f;
    border: none; border-radius: 10px;
    font-size: 14px; font-weight: 700;
    cursor: pointer;
    transition: background 0.15s, opacity 0.15s;
    font-family: inherit;
    letter-spacing: 0.2px;
  }
  .btn-primary:hover { background: #FFD426; }
  .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }

  /* Footer link */
  .footer-link {
    text-align: center; margin-top: 20px;
    font-size: 13px; color: rgba(240,240,242,0.32);
  }
  .footer-link a {
    color: #F5C518; font-weight: 600;
    text-decoration: none; cursor: pointer;
  }
  .footer-link a:hover { color: #FFD426; }

  /* Page toggle */
  .page { display: none; }
  .page.active { display: block; }
</style>
</head>
<body>
  <div class="arc arc-tl"></div>
  <div class="arc arc-br"></div>
  <div class="arc-tr-glow"></div>
  <div class="arc-bl-glow"></div>

  <!-- Window chrome -->
  <div class="win-header">
    <span class="brand">◆  MoodRipple</span>
    <div class="win-controls">
      <button class="win-btn" onclick="bridge && bridge.minimize_win()">—</button>
      <button class="win-btn close" onclick="bridge && bridge.close_win()">✕</button>
    </div>
  </div>

  <div class="main">
    <div class="card">
      <!-- ── Login Page ──────────────────────────────────────── -->
      <div id="loginPage" class="page active">
        <div class="orb">◆</div>
        <h1>Welcome back</h1>
        <p class="subtitle">Sign in to your MoodRipple account</p>

        <div id="loginError" class="error-box"></div>

        <div class="field">
          <label>Username</label>
          <input id="loginUser" type="text" placeholder="Enter your username"
                 autocomplete="off" spellcheck="false">
        </div>
        <div class="field">
          <label>Password</label>
          <input id="loginPass" type="password" placeholder="Enter your password">
        </div>

        <label class="remember">
          <input type="checkbox" id="rememberMe">
          <span class="check-box" id="checkBox">✓</span>
          <span>Keep me signed in</span>
        </label>

        <button class="btn-primary" id="loginBtn" onclick="doLogin()">Sign In</button>
        <p class="footer-link">
          Don't have an account?
          <a onclick="showRegister()">Create one →</a>
        </p>
      </div>

      <!-- ── Register Page ───────────────────────────────────── -->
      <div id="registerPage" class="page">
        <div class="orb">◆</div>
        <h1>Create account</h1>
        <p class="subtitle">Join MoodRipple — it only takes a moment</p>

        <div id="registerError" class="error-box"></div>

        <div class="field">
          <label>Username</label>
          <input id="regUser" type="text" placeholder="e.g. john_doe"
                 autocomplete="off" spellcheck="false">
        </div>
        <div class="field">
          <label>Email</label>
          <input id="regEmail" type="email" placeholder="you@example.com">
        </div>
        <div class="field">
          <label>Password</label>
          <input id="regPass" type="password" placeholder="At least 6 characters">
        </div>
        <div class="field" style="margin-bottom:22px">
          <label>Confirm Password</label>
          <input id="regConfirm" type="password" placeholder="Repeat your password">
        </div>

        <button class="btn-primary" id="registerBtn" onclick="doRegister()">Create Account</button>
        <p class="footer-link">
          Already have an account?
          <a onclick="showLogin()">Sign in →</a>
        </p>
      </div>
    </div>
  </div>

  <script src="qrc:///qtwebchannel/qwebchannel.js"></script>
  <script>
    var bridge = null;

    new QWebChannel(qt.webChannelTransport, function(ch) {
      bridge = ch.objects.bridge;

      bridge.auth_result.connect(function(jsonStr) {
        var data = JSON.parse(jsonStr);
        if (data.ok) {
          // Auth handled on Python side — window closes automatically
        } else {
          showError(data.page === 'register' ? 'registerError' : 'loginError', data.error);
          resetBtn(data.page === 'register' ? 'registerBtn' : 'loginBtn',
                   data.page === 'register' ? 'Create Account' : 'Sign In');
        }
      });
    });

    // ── Remember me checkbox ──────────────────────────────────────
    var rememberMe = document.getElementById('rememberMe');
    var checkBox   = document.getElementById('checkBox');
    document.querySelector('.remember').addEventListener('click', function() {
      rememberMe.checked = !rememberMe.checked;
      checkBox.style.background = rememberMe.checked ? '#F5C518' : '';
      checkBox.style.borderColor = rememberMe.checked ? '#F5C518' : '';
      checkBox.style.color = rememberMe.checked ? '#0c0c0f' : '';
    });

    // ── Login ─────────────────────────────────────────────────────
    function doLogin() {
      var u = document.getElementById('loginUser').value.trim();
      var p = document.getElementById('loginPass').value;
      clearError('loginError');
      if (!u || !p) { showError('loginError', 'Please fill in all fields.'); return; }
      setBusy('loginBtn', 'Signing in…');
      if (bridge) bridge.login(u, p);
    }

    // ── Register ──────────────────────────────────────────────────
    function doRegister() {
      var u  = document.getElementById('regUser').value.trim();
      var e  = document.getElementById('regEmail').value.trim();
      var p  = document.getElementById('regPass').value;
      var c  = document.getElementById('regConfirm').value;
      clearError('registerError');
      if (!u || !e || !p || !c) { showError('registerError', 'Please fill in all fields.'); return; }
      if (p !== c)               { showError('registerError', 'Passwords do not match.'); return; }
      setBusy('registerBtn', 'Creating account…');
      if (bridge) bridge.register(u, e, p);
    }

    // ── Page switching ────────────────────────────────────────────
    function showRegister() {
      document.getElementById('loginPage').classList.remove('active');
      document.getElementById('registerPage').classList.add('active');
      clearError('registerError');
    }
    function showLogin() {
      document.getElementById('registerPage').classList.remove('active');
      document.getElementById('loginPage').classList.add('active');
      clearError('loginError');
    }

    // ── Helpers ───────────────────────────────────────────────────
    function showError(id, msg) {
      var el = document.getElementById(id);
      el.textContent = msg;
      el.classList.add('visible');
    }
    function clearError(id) {
      var el = document.getElementById(id);
      el.textContent = '';
      el.classList.remove('visible');
    }
    function setBusy(id, label) {
      var btn = document.getElementById(id);
      btn.disabled = true;
      btn.textContent = label;
    }
    function resetBtn(id, label) {
      var btn = document.getElementById(id);
      btn.disabled = false;
      btn.textContent = label;
    }

    // Enter key support
    document.getElementById('loginPass').addEventListener('keydown', function(e) {
      if (e.key === 'Enter') doLogin();
    });
    document.getElementById('regConfirm').addEventListener('keydown', function(e) {
      if (e.key === 'Enter') doRegister();
    });
  </script>
</body>
</html>
