<div style="width:100%;max-width:min(640px,100%)">

  <!-- Page header -->
  <div style="display:flex;align-items:center;gap:18px;margin-bottom:32px">
    <div style="width:56px;height:56px;border-radius:16px;background:rgba(29,185,84,0.12);border:1px solid rgba(29,185,84,0.20);display:flex;align-items:center;justify-content:center;font-size:26px;flex-shrink:0;box-shadow:0 4px 20px rgba(29,185,84,0.15)">🎧</div>
    <div>
      <div class="page-title">Spotify</div>
      <div class="page-sub">Connect for emotion-driven music playback</div>
    </div>
  </div>

  <!-- Connection card -->
  <div class="card" style="padding:28px;margin-bottom:16px">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:20px">
      <div>
        <div style="font-size:14px;font-weight:600;color:var(--t1);margin-bottom:4px">Connection Status</div>
        <div id="spStatus" style="font-size:12px;color:var(--t3)">Not connected</div>
      </div>
      <div id="spDot" style="width:10px;height:10px;border-radius:50%;background:rgba(255,255,255,0.15);box-shadow:0 0 0 3px rgba(255,255,255,0.05)"></div>
    </div>
    <div style="display:flex;gap:12px">
      <button id="spConBtn" onclick="bridge&&bridge.connect_spotify()" class="pill-btn sp">🎵&nbsp; Connect Spotify</button>
      <button id="spDisBtn" onclick="bridge&&bridge.disconnect_spotify()" class="pill-btn danger" style="display:none">Disconnect</button>
    </div>
  </div>

  <!-- Now playing card -->
  <div class="card" style="padding:28px">
    <div class="card-hdr"><span class="sec-lbl">Now Playing</span></div>
    <div style="display:flex;align-items:center;gap:16px">
      <div id="spArt" style="width:56px;height:56px;border-radius:14px;flex-shrink:0;background:rgba(255,255,255,0.07);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:24px;box-shadow:var(--shadow-sm)">🎵</div>
      <div style="flex:1;min-width:0">
        <div id="spName" style="font-size:15px;font-weight:700;color:var(--t1);white-space:nowrap;overflow:hidden;text-overflow:ellipsis">—</div>
        <div id="spArtist" style="font-size:12px;color:var(--t3);margin-top:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">—</div>
      </div>
    </div>
  </div>
</div>
