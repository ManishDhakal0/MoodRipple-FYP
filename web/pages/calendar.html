<div style="width:100%;max-width:min(640px,100%)">

  <!-- Page header -->
  <div style="display:flex;align-items:center;gap:18px;margin-bottom:32px">
    <div style="width:56px;height:56px;border-radius:16px;background:rgba(66,133,244,0.12);border:1px solid rgba(66,133,244,0.20);display:flex;align-items:center;justify-content:center;font-size:26px;flex-shrink:0;box-shadow:0 4px 20px rgba(66,133,244,0.15)">📅</div>
    <div>
      <div class="page-title">Google Calendar</div>
      <div class="page-sub">Stay ahead of meetings and upcoming events</div>
    </div>
  </div>

  <!-- Connection card -->
  <div class="card" style="padding:28px;margin-bottom:16px">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:20px">
      <div>
        <div style="font-size:14px;font-weight:600;color:var(--t1);margin-bottom:4px">Connection Status</div>
        <div id="calStatus" style="font-size:12px;color:var(--t3)">Not connected</div>
      </div>
    </div>
    <div style="display:flex;gap:12px">
      <button id="calConBtn" onclick="bridge&&bridge.connect_calendar()" class="pill-btn cal">📅&nbsp; Connect Google Calendar</button>
      <button id="calDisBtn" onclick="bridge&&bridge.disconnect_calendar()" class="pill-btn danger" style="display:none">Disconnect</button>
    </div>
  </div>

  <!-- Events card -->
  <div class="card" style="padding:28px">
    <div class="card-hdr"><span class="sec-lbl">Upcoming Events</span></div>
    <div id="calPageList"><div class="cal-empty">Connect Calendar to see events</div></div>
  </div>
</div>
