<!-- Chat header -->
<div style="display:flex;align-items:center;gap:14px;padding:16px 24px;flex-shrink:0;
            border-bottom:1px solid rgba(255,255,255,0.055);background:rgba(10,10,16,0.55)">
  <div style="width:38px;height:38px;border-radius:10px;background:var(--acc-dim);border:1px solid var(--acc-bd);display:flex;align-items:center;justify-content:center;color:var(--accent);font-size:17px;flex-shrink:0;box-shadow:0 0 16px rgba(139,92,246,0.25)">◇</div>
  <div style="flex:1">
    <div style="font-size:15px;font-weight:800;color:var(--t1)">MoodBot</div>
    <div style="font-size:11px;color:var(--t3);margin-top:1px">Your emotion-aware music assistant</div>
  </div>
  <div style="display:flex;align-items:center;gap:6px;background:rgba(52,211,153,0.08);border:1px solid rgba(52,211,153,0.18);border-radius:100px;padding:4px 12px">
    <div style="width:6px;height:6px;border-radius:50%;background:rgba(52,211,153,0.80)"></div>
    <span style="font-size:10px;color:rgba(52,211,153,0.75);font-weight:600">Online</span>
  </div>
  <button id="ttsBtn" title="Toggle voice responses"
          onclick="bridge&&bridge.toggle_tts()"
          style="background:transparent;border:1px solid rgba(255,255,255,0.09);border-radius:8px;color:rgba(240,240,248,0.35);font-size:13px;padding:5px 12px;cursor:pointer;transition:all 0.18s;font-family:inherit"
          onmouseover="this.style.color='#f0f0f8';this.style.borderColor='rgba(255,255,255,0.18)'"
          onmouseout="this.style.color=_ttsOn?'#F5C518':'rgba(240,240,248,0.35)';this.style.borderColor=_ttsOn?'rgba(245,197,24,0.40)':'rgba(255,255,255,0.09)'">🔇</button>
</div>

<!-- Chat messages -->
<div id="fullMsgs"
     style="flex:1;overflow-y:auto;padding:24px 28px;display:flex;flex-direction:column;gap:12px;
            background:radial-gradient(ellipse 60% 40% at 50% 80%, rgba(139,92,246,0.03) 0%,transparent 70%)">
  <div class="bubble bot">Hi! I'm MoodBot — your emotion-aware music assistant. 😊<br><br>
    I can control your Spotify, change genres, and react to your mood in real time.<br>
    Try typing <em>help</em> to see all commands!</div>
</div>

<!-- Input bar -->
<div style="display:flex;gap:12px;padding:16px 24px;flex-shrink:0;
            border-top:1px solid rgba(255,255,255,0.055);background:rgba(10,10,16,0.55)">
  <input id="fullInp" placeholder="Ask MoodBot anything…  (try 'skip', 'play lofi', 'how am I?')"
         class="inp" style="flex:1;font-size:13px;padding:11px 18px;border-radius:100px"
         onkeydown="if(event.key==='Enter')sendFull()">
  <button onclick="sendFull()"
          style="height:44px;padding:0 26px;border-radius:100px;font-size:13px;font-weight:700;cursor:pointer;border:none;font-family:inherit;background:var(--accent);color:#fff;transition:all 0.18s;box-shadow:0 4px 18px rgba(139,92,246,0.38)"
          onmouseover="this.style.background='#9d74f7';this.style.boxShadow='0 4px 24px rgba(139,92,246,0.55)'"
          onmouseout ="this.style.background='var(--accent)';this.style.boxShadow='0 4px 18px rgba(139,92,246,0.38)'">
    Send →
  </button>
  <button id="micBtn" title="Click to record voice (Whisper STT)"
          onclick="bridge&&bridge.mic_toggle()"
          style="height:44px;min-width:44px;padding:0 14px;border-radius:100px;font-size:16px;cursor:pointer;font-family:inherit;transition:all 0.18s;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.10);color:var(--t2)">🎤</button>
</div>
