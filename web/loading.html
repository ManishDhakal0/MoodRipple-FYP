<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>MoodRipple</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #0c0c0f;
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
    height: 100vh;
    overflow: hidden;
    color: #fff;
    -webkit-app-region: drag;
    user-select: none;
  }

  /* Subtle arc decorations */
  .arc {
    position: fixed;
    border-radius: 50%;
    border: 1px solid rgba(255,255,255,0.04);
    pointer-events: none;
  }
  .arc-tl { width: 480px; height: 480px; top: -220px; left: -180px; }
  .arc-br { width: 420px; height: 420px; bottom: -180px; right: -160px; }
  .arc-tr { width: 260px; height: 260px; top: -80px; right: -60px;
            border-color: rgba(245,197,24,0.05); }

  /* Card */
  .card {
    position: relative;
    background: #161618;
    border: 1px solid rgba(255,255,255,0.07);
    border-radius: 24px;
    padding: 56px 72px 52px;
    text-align: center;
    min-width: 360px;
    box-shadow: 0 40px 100px rgba(0,0,0,0.55);
    z-index: 10;
  }

  /* Orb */
  .orb {
    width: 84px; height: 84px;
    background: radial-gradient(circle at 38% 38%,
      #FFE535 0%, #F5C518 38%, rgba(245,197,24,0.08) 75%);
    border-radius: 50%;
    margin: 0 auto 28px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 28px;
    color: #0c0c0f;
    animation: orbPulse 2.4s ease-in-out infinite;
  }
  @keyframes orbPulse {
    0%,100% { box-shadow: 0 0 32px rgba(245,197,24,0.30), 0 0 70px rgba(245,197,24,0.12); }
    50%      { box-shadow: 0 0 52px rgba(245,197,24,0.50), 0 0 100px rgba(245,197,24,0.22); }
  }

  h1 {
    font-size: 30px;
    font-weight: 800;
    color: #f0f0f2;
    letter-spacing: -0.6px;
    margin-bottom: 6px;
  }
  .tagline {
    font-size: 13px;
    color: rgba(240,240,242,0.32);
    margin-bottom: 38px;
    letter-spacing: 0.2px;
  }

  /* Spinner */
  .spinner {
    width: 28px; height: 28px;
    border: 2px solid rgba(245,197,24,0.14);
    border-top-color: #F5C518;
    border-radius: 50%;
    margin: 0 auto 14px;
    animation: spin 0.75s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .status {
    font-size: 12px;
    color: rgba(240,240,242,0.28);
    letter-spacing: 0.1px;
    min-height: 18px;
    transition: color 0.3s;
  }
</style>
</head>
<body>
  <div class="arc arc-tl"></div>
  <div class="arc arc-br"></div>
  <div class="arc arc-tr"></div>

  <div class="card">
    <div class="orb">◆</div>
    <h1>MoodRipple</h1>
    <p class="tagline">Emotion-aware music experience</p>
    <div class="spinner"></div>
    <p class="status" id="status">Starting up…</p>
  </div>

  <script src="qrc:///qtwebchannel/qwebchannel.js"></script>
  <script>
    new QWebChannel(qt.webChannelTransport, function(ch) {
      ch.objects.bridge.loading_status.connect(function(msg) {
        document.getElementById('status').textContent = msg;
      });
    });
  </script>
</body>
</html>
